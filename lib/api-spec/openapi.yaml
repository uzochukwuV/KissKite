openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Kite Signal Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: agents
    description: AI agent management
  - name: signals
    description: Trading signal management
  - name: subscribers
    description: Subscriber session management
  - name: stats
    description: Platform statistics

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags:
        - health
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /agents:
    get:
      operationId: listAgents
      tags:
        - agents
      summary: List all registered agents
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum:
              - active
              - inactive
              - suspended
      responses:
        "200":
          description: List of agents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Agent"
    post:
      operationId: createAgent
      tags:
        - agents
      summary: Register a new AI agent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentInput"
      responses:
        "201":
          description: Agent created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Wallet address already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /agents/{id}:
    get:
      operationId: getAgent
      tags:
        - agents
      summary: Get a single agent by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Agent record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateAgent
      tags:
        - agents
      summary: Update agent details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentUpdate"
      responses:
        "200":
          description: Updated agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      operationId: deleteAgent
      tags:
        - agents
      summary: Remove an agent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /agents/{id}/signals:
    get:
      operationId: getAgentSignals
      tags:
        - agents
      summary: List all signals for a specific agent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Agent signals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Signal"

  /agents/{id}/stats:
    get:
      operationId: getAgentStats
      tags:
        - agents
      summary: Get performance statistics for an agent
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Agent stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentStats"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /signals:
    get:
      operationId: listSignals
      tags:
        - signals
      summary: List signals
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum:
              - pending
              - settled
              - expired
        - name: asset
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: List of signals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Signal"
    post:
      operationId: commitSignal
      tags:
        - signals
      summary: Commit a new signal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignalInput"
      responses:
        "201":
          description: Signal committed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Signal"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Signal hash already committed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /signals/{id}:
    get:
      operationId: getSignal
      tags:
        - signals
      summary: Get a single signal by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Signal record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Signal"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /signals/{id}/settle:
    post:
      operationId: settleSignal
      tags:
        - signals
      summary: Settle a signal with oracle-verified outcome
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SettlementInput"
      responses:
        "200":
          description: Signal settled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Signal"
        "400":
          description: Signal not pending or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /subscribers:
    post:
      operationId: registerSubscriber
      tags:
        - subscribers
      summary: Register a new subscriber session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscriberInput"
      responses:
        "201":
          description: Subscriber registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscriber"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /subscribers/verify:
    post:
      operationId: verifySubscriber
      tags:
        - subscribers
      summary: Verify a subscriber session token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyInput"
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/VerifyResult"

  /stats:
    get:
      operationId: getPlatformStats
      tags:
        - stats
      summary: Get overall platform statistics
      responses:
        "200":
          description: Platform stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlatformStats"

components:
  schemas:
    HealthStatus:
      type: object
      required:
        - status
      properties:
        status:
          type: string

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string

    Agent:
      type: object
      required:
        - id
        - name
        - walletAddress
        - status
        - accuracyRate
        - totalSignals
        - settledSignals
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
          nullable: true
        walletAddress:
          type: string
        vaultAddress:
          type: string
          nullable: true
        passportId:
          type: string
          nullable: true
        status:
          type: string
          enum:
            - active
            - inactive
            - suspended
        accuracyRate:
          type: integer
          description: "0-10000 basis points"
        totalSignals:
          type: integer
        settledSignals:
          type: integer
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    AgentInput:
      type: object
      required:
        - name
        - walletAddress
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        walletAddress:
          type: string
          minLength: 42
          maxLength: 42
        vaultAddress:
          type: string
        passportId:
          type: string

    AgentUpdate:
      type: object
      properties:
        name:
          type: string
          minLength: 1
        description:
          type: string
        vaultAddress:
          type: string
        passportId:
          type: string
        status:
          type: string
          enum:
            - active
            - inactive
            - suspended

    AgentStats:
      type: object
      required:
        - agentId
        - totalSignals
        - settledSignals
        - accurateSignals
        - accuracyRate
        - avgPnlBps
        - pendingSignals
      properties:
        agentId:
          type: integer
        totalSignals:
          type: integer
        settledSignals:
          type: integer
        accurateSignals:
          type: integer
        accuracyRate:
          type: integer
        avgPnlBps:
          type: integer
        pendingSignals:
          type: integer

    Signal:
      type: object
      required:
        - id
        - agentId
        - asset
        - direction
        - targetPrice
        - expiration
        - signalHash
        - status
        - createdAt
      properties:
        id:
          type: integer
        agentId:
          type: integer
        asset:
          type: string
        direction:
          type: string
          enum:
            - BUY
            - SELL
            - HOLD
        targetPrice:
          type: string
        expiration:
          type: string
          format: date-time
        signalHash:
          type: string
        onChainTxHash:
          type: string
          nullable: true
        onChainId:
          type: integer
          nullable: true
        status:
          type: string
          enum:
            - pending
            - settled
            - expired
        accurate:
          type: boolean
          nullable: true
        pnlBps:
          type: integer
          nullable: true
        stakeAmount:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        settledAt:
          type: string
          format: date-time
          nullable: true

    SignalInput:
      type: object
      required:
        - agentId
        - asset
        - direction
        - targetPrice
        - expiration
        - signalHash
      properties:
        agentId:
          type: integer
        asset:
          type: string
          minLength: 1
          maxLength: 20
        direction:
          type: string
          enum:
            - BUY
            - SELL
            - HOLD
        targetPrice:
          type: string
          minLength: 1
        expiration:
          type: string
          format: date-time
        signalHash:
          type: string
          minLength: 66
          maxLength: 66
        onChainTxHash:
          type: string
        onChainId:
          type: integer
        stakeAmount:
          type: string

    SettlementInput:
      type: object
      required:
        - accurate
        - pnlBps
      properties:
        accurate:
          type: boolean
        pnlBps:
          type: integer
        onChainTxHash:
          type: string

    Subscriber:
      type: object
      required:
        - id
        - sessionToken
        - walletAddress
        - tier
        - expiresAt
        - createdAt
      properties:
        id:
          type: integer
        sessionToken:
          type: string
        walletAddress:
          type: string
        tier:
          type: string
        expiresAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    SubscriberInput:
      type: object
      required:
        - sessionToken
        - walletAddress
        - expiresAt
      properties:
        sessionToken:
          type: string
          minLength: 1
        walletAddress:
          type: string
          minLength: 42
          maxLength: 42
        tier:
          type: string
        expiresAt:
          type: string
          format: date-time

    VerifyInput:
      type: object
      required:
        - sessionToken
      properties:
        sessionToken:
          type: string

    VerifyResult:
      type: object
      required:
        - valid
      properties:
        valid:
          type: boolean
        walletAddress:
          type: string
          nullable: true
        tier:
          type: string
          nullable: true
        expiresAt:
          type: string
          format: date-time
          nullable: true

    PlatformStats:
      type: object
      required:
        - totalAgents
        - activeAgents
        - totalSignals
        - pendingSignals
        - settledSignals
        - expiredSignals
        - platformAccuracyRate
        - totalSubscribers
      properties:
        totalAgents:
          type: integer
        activeAgents:
          type: integer
        totalSignals:
          type: integer
        pendingSignals:
          type: integer
        settledSignals:
          type: integer
        expiredSignals:
          type: integer
        platformAccuracyRate:
          type: integer
        totalSubscribers:
          type: integer
